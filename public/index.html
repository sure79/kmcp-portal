<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KMCP 연구소 업무포털</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">K</div>
      <h1>KMCP 연구소</h1>
      <p>업무관리 포털</p>
    </div>

    <!-- 로그인 폼 -->
    <form id="login-form">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="login-username" placeholder="아이디를 입력하세요" required>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-password" placeholder="비밀번호를 입력하세요" required>
      </div>
      <div id="login-error" class="error-msg" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-full">로그인</button>
    </form>
    <div class="login-divider"><span>또는</span></div>
    <button class="btn btn-secondary btn-full" onclick="showRegisterForm()">회원가입</button>

    <!-- 회원가입 폼 (숨김) -->
    <form id="register-form" style="display:none">
      <div class="form-group">
        <label>이름 *</label>
        <input type="text" id="reg-name" placeholder="이름을 입력하세요" required>
      </div>
      <div class="form-group">
        <label>부서</label>
        <input type="text" id="reg-dept" placeholder="예: 전기팀">
      </div>
      <div class="form-group">
        <label>직급</label>
        <input type="text" id="reg-position" placeholder="예: 담당">
      </div>
      <div class="form-group">
        <label>아이디 *</label>
        <input type="text" id="reg-username" placeholder="로그인에 사용할 아이디" required>
      </div>
      <div class="form-group">
        <label>비밀번호 *</label>
        <input type="password" id="reg-password" placeholder="4자 이상" required>
      </div>
      <div class="form-group">
        <label>비밀번호 확인 *</label>
        <input type="password" id="reg-password2" placeholder="비밀번호를 다시 입력하세요" required>
      </div>
      <div id="register-error" class="error-msg" style="display:none"></div>
      <div id="register-success" class="success-msg" style="display:none"></div>
      <button type="submit" class="btn btn-coral btn-full">가입 신청</button>
      <button type="button" class="btn btn-ghost btn-full" style="margin-top:8px" onclick="showLoginForm()">로그인으로 돌아가기</button>
    </form>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app" style="display:none">
  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-mark">K</div>
        <span class="brand-text">KMCP 연구소</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <a href="#" class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="nav-text">홈</span>
        </a>
        <a href="#" class="nav-item" data-page="reports">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span class="nav-text">업무보고</span>
        </a>
        <a href="#" class="nav-item" data-page="team">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          <span class="nav-text">팀 현황</span>
        </a>
        <a href="#" class="nav-item" data-page="weekly-report">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
          <span class="nav-text">주간 종합</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">작업 관리</div>
        <a href="#" class="nav-item" data-page="calendar">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><rect x="7" y="14" width="3" height="3" rx="0.5"/></svg>
          <span class="nav-text">달력</span>
        </a>
        <a href="#" class="nav-item" data-page="kanban">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
          <span class="nav-text">칸반 보드</span>
        </a>
        <a href="#" class="nav-item" data-page="projects">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          <span class="nav-text">프로젝트</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">커뮤니케이션</div>
        <a href="#" class="nav-item" data-page="meetings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="nav-text">회의</span>
        </a>
        <a href="#" class="nav-item" data-page="fieldtrips">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 000 20M2 12h20"/></svg>
          <span class="nav-text">외근 · 출장 · 휴가</span>
        </a>
        <a href="#" class="nav-item" data-page="notices">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="nav-text">공지사항</span>
        </a>
        <a href="#" class="nav-item" data-page="suggestions">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span class="nav-text">건의사항</span>
        </a>
        <a href="#" class="nav-item" data-page="polls">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="12" rx="1"/><rect x="17" y="4" width="4" height="16" rx="1"/></svg>
          <span class="nav-text">투표</span>
        </a>
      </div>

      <div class="nav-section">
        <a href="#" class="nav-item admin-only" data-page="users" style="display:none">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span class="nav-text">설정</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user">
        <div class="avatar avatar-sm" id="user-avatar">?</div>
        <div class="user-detail">
          <div class="user-name" id="user-name-display">-</div>
          <div class="user-dept" id="user-dept-display">-</div>
        </div>
        <button class="btn-icon-ghost" id="logout-btn" title="로그아웃">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- 메인 영역 -->
  <div class="main-wrapper">
    <!-- 상단 헤더바 -->
    <header class="topbar" id="topbar">
      <button class="btn-icon-ghost sidebar-toggle-btn" id="sidebar-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="global-search" placeholder="검색...">
      </div>
      <div class="topbar-actions">
        <div class="topbar-today" id="topbar-today"></div>
        <!-- 알림 벨 -->
        <div class="notif-wrapper" id="notif-wrapper">
          <button class="btn-icon-ghost notif-bell" id="notif-bell" onclick="toggleNotifications()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="notif-badge" id="notif-badge" style="display:none">0</span>
          </button>
          <div class="notif-dropdown" id="notif-dropdown" style="display:none" onclick="event.stopPropagation()">
            <div class="notif-header">
              <div style="display:flex;gap:0">
                <button id="tab-btn-alerts" class="btn btn-sm btn-secondary" onclick="switchNotifTab('alerts')" style="border-radius:6px 0 0 6px">알림</button>
                <button id="tab-btn-history" class="btn btn-sm btn-ghost" onclick="switchNotifTab('history')" style="border-radius:0 6px 6px 0">활동 기록</button>
              </div>
              <button class="btn btn-ghost btn-sm" onclick="closeNotifications()">닫기</button>
            </div>
            <div id="notif-tab-alerts" class="notif-list"></div>
            <div id="notif-tab-history" class="notif-list" style="display:none"></div>
          </div>
        </div>
        <button class="btn btn-coral" onclick="navigateTo('reports');setTimeout(()=>openReportForm(),300)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>보고서 작성</span>
        </button>
      </div>
      <!-- 검색 결과 드롭다운 -->
      <div class="search-dropdown" id="search-dropdown" style="display:none">
        <div class="search-results" id="search-results"></div>
      </div>
    </header>

    <!-- 페이지 컨텐츠 -->
    <main class="main-content" id="main-content">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-team" class="page"></div>
      <div id="page-weekly-report" class="page"></div>
      <div id="page-reports" class="page"></div>
      <div id="page-calendar" class="page"></div>
      <div id="page-kanban" class="page"></div>
      <div id="page-projects" class="page"></div>
      <div id="page-meetings" class="page"></div>
      <div id="page-fieldtrips" class="page"></div>
      <div id="page-notices" class="page"></div>
      <div id="page-suggestions" class="page"></div>
      <div id="page-polls" class="page"></div>
      <div id="page-users" class="page"></div>
    </main>
  </div>
</div>

<!-- 모달 -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title">제목</h3>
      <button class="modal-close" id="modal-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- 토스트 알림 -->
<div id="toast-container"></div>

<!-- 채팅 FAB 버튼 -->
<button class="chat-fab" id="chat-fab" onclick="toggleChat()" title="팀 채팅">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  <span class="chat-badge" id="chat-badge" style="display:none">0</span>
</button>

<!-- 채팅 패널 -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <div class="chat-panel-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      팀 채팅
    </div>
    <button class="chat-close-btn" onclick="toggleChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <input type="text" id="chat-message-input" class="chat-input" placeholder="메시지를 입력하세요... (Enter 전송)" onkeydown="onChatKeydown(event)">
    <button class="btn btn-coral btn-sm" onclick="sendChatMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/comments.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/team.js"></script>
<script src="/js/weekly-report.js"></script>
<script src="/js/reports.js"></script>
<script src="/js/calendar.js"></script>
<script src="/js/kanban.js"></script>
<script src="/js/projects.js"></script>
<script src="/js/meetings.js"></script>
<script src="/js/fieldtrips.js"></script>
<script src="/js/notices.js"></script>
<script src="/js/suggestions.js"></script>
<script src="/js/polls.js"></script>
<script src="/js/users.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
